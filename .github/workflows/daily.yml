name: AI Daily News

on:
  schedule:
    # 每天 01:00 UTC = 台北 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-news-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run daily
        env:
          MODE: daily
          TZ: Asia/Taipei
          LOOKBACK_HOURS: '26'
          SUMMARIZER: anthropic-api
          ANTHROPIC_MODEL: claude-haiku-4-5
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LINE: 'true'
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}
          ENABLE_EMAIL: 'true'
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '465'
          SMTP_SECURE: 'true'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: npm run daily

      - name: Persist seen state
        run: |
          if [[ -n "$(git status --porcelain data/seen.json 2>/dev/null)" ]]; then
            git config user.email "actions@github.com"
            git config user.name "github-actions[bot]"
            git add data/seen.json
            git commit -m "chore(state): update seen.json [skip ci]"
            git push
          fi
